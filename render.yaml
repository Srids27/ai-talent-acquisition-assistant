services:
  - type: web
    name: aria-backend
    runtime: python
    rootDir: backend

    buildCommand: |
      apt-get update
      apt-get install -y python3.11 python3.11-venv python3.11-dev
      python3.11 -m venv venv
      . venv/bin/activate
      pip install --upgrade pip
      pip install -r requirements.txt

    startCommand: venv/bin/uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: MONGODB_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FLUSH_ON_STARTUP
        value: "false"
      - key: DATABASE_NAME
        value: aria_recruitment
