services:
  - type: web
    name: aria-backend
    runtime: python
    rootDir: backend

    buildCommand: |
      python3.11 -m pip install --upgrade pip
      python3.11 -m pip install -r requirements.txt

    startCommand: python3.11 -m uvicorn main:app --host 0.0.0.0 --port $PORT

    envVars:
      - key: MONGODB_URL
        sync: false
      - key: GROQ_API_KEY
        sync: false
      - key: SECRET_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: FLUSH_ON_STARTUP
        value: "false"
      - key: DATABASE_NAME
        value: aria_recruitment
